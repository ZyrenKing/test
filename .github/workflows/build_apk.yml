name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  ACCEPT_ALL_ANDROID_LICENSES: "true"
  PIP_NO_INPUT: "true"
  PIP_EXISTS_ACTION: "w"

jobs:
  build:
    runs-on: ubuntu-latest

    # تفعيل صلاحيات الكتابة للخادم لكي يتمكن من حفظ الملف في مستودعك
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.41.7'

    - name: Install Linux GTK Libraries
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev ninja-build

    - name: Automatically Accept All Licenses
      run: |
        mkdir -p ${{ github.workspace }}/Android/sdk/licenses || true
        echo -e "\n8933bad161adac78b90f114c1863003a253d5019\n45f944a904d32b50bf604d4124b87563d34729b8\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910\n27103150a04576831d1e44f83f21fbdd3ca0e065\n11333f6a35b273f50544ccb708b3d697517c3857" > ${{ github.workspace }}/Android/sdk/licenses/android-sdk-license || true
        yes | flutter doctor --android-licenses || true

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        echo "/home/runner/.local/bin" >> $GITHUB_PATH

    - name: Build APK via Flet CLI
      run: |
        export PATH=$PATH:/home/runner/.local/bin
        flet build apk --arch arm64-v8a

    - name: Push APK directly to Repository Branch
      # 💡 خطوة سحرية: البحث عن ملف الـ APK في أي مكان مخفي وحفظه بداخل مستودعك الخاص فوراً
      run: |
        mkdir -p deploy_apk
        find build/ -name "*.apk" -exec cp {} deploy_apk/app-release.apk \;
        
    - name: Deploy APK to GitHub Branch
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: deploy_apk
        branch: apk-release # اسم الفرع الجديد الذي ستجده في مستودعك ويحتوي على الملف
